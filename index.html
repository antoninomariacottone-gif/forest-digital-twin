<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>Digital Twin Forestale</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(1200px 700px at 20% 10%, #122019 0%, #0c1110 55%, #070b0a 100%);
        color: #e7f0ec;
      }
      .boot {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 18px;
      }
      .boot-card {
        width: min(720px, 92vw);
        border: 1px solid #24332e;
        border-radius: 16px;
        background: rgba(15, 22, 20, 0.55);
        padding: 14px 14px;
      }
      .boot-title {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #a9b9b2;
      }
      .boot-body {
        margin-top: 10px;
        font-size: 13px;
        color: #dbe6e1;
        line-height: 1.45;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: #a9b9b2;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot" class="boot">
      <div class="boot-card">
        <div class="boot-title">Avvio</div>
        <div class="boot-body">
          Caricamento dell'interfaccia...
          <div class="mono" style="margin-top: 10px">Se questa schermata resta visibile, controlla eventuali blocchi dell'antivirus oppure la Console (F12).</div>
        </div>
        <noscript>
          <div style="margin-top: 10px; color: #ffb4b4">JavaScript e disattivato: la simulazione richiede JS attivo.</div>
        </noscript>
      </div>
    </div>

    <!-- Dev: Vite loads /src/main.tsx. Prod: Vite rewrites this to /assets/*.js. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
